name: GlassBox CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      # SHA-pinned to actions/checkout v4.2.2 (CI-4: supply-chain hardening)
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      # Pinned to stable major (v5)
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install lint tools
        run: |
          pip install black>=24.0 isort>=5.0 pylint>=3.0 mypy>=1.0

      - name: Check formatting (black)
        run: black --check --line-length 100 glassbox tests

      - name: Check import order (isort)
        run: isort --check-only --profile black --line-length 100 glassbox tests

      - name: Static analysis (pylint)
        run: |
          pylint glassbox \
            --disable=too-many-arguments,too-many-locals,too-many-branches,too-many-statements \
            --disable=too-many-instance-attributes,too-few-public-methods \
            --disable=missing-module-docstring,missing-function-docstring \
            --fail-under=8.0

      - name: Type checking (mypy)
        run: mypy glassbox --ignore-missing-imports --no-error-summary

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      # SHA-pinned to actions/checkout v4.2.2
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      # Pinned to stable major (v5)
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install security tools
        run: pip install bandit>=1.7 pip-audit>=2.0

      - name: Security scan (bandit)
        run: |
          bandit -r glassbox \
            --skip B101,B311 \
            --severity-level medium \
            --confidence-level medium

      # CI-3: Scan installed dependencies for known CVEs
      - name: Dependency vulnerability scan (pip-audit)
        run: |
          pip install flask>=3.0.0,<5.0 pyyaml>=6.0,<7.0 \
            cryptography>=42.0.0,<46.0 redis>=5.0.0,<6.0
          pip-audit --require-hashes=false --progress-spinner off

  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      # SHA-pinned to actions/checkout v4.2.2
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      # Pinned to stable major (v5)
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install pytest pytest-cov \
            flask>=3.0.0,<5.0 \
            pyyaml>=6.0,<7.0 \
            cryptography>=42.0.0,<46.0

      # T-1: Coverage threshold raised to 80% (aligned with pyproject.toml)
      - name: Run all tests with coverage
        env:
          GLASSBOX_LOG_LEVEL: CRITICAL
        run: |
          python -m pytest tests/ -v --tb=short \
            --cov=glassbox \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=80

      # SHA-pinned to actions/upload-artifact v4.6.0
      - name: Upload coverage report
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@6f51ac03b9356f520e9adb1b1b7802705f340c2b
        with:
          name: coverage-report
          path: coverage.xml

      - name: Run examples
        env:
          GLASSBOX_LOG_LEVEL: CRITICAL
        run: python examples/industry_examples.py

      - name: Run benchmarks
        env:
          GLASSBOX_LOG_LEVEL: CRITICAL
        run: python -m glassbox.benchmarks.run_benchmarks

  property-tests:
    name: Property-Based Tests
    runs-on: ubuntu-latest
    steps:
      # SHA-pinned to actions/checkout v4.2.2
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      # Pinned to stable major (v5)
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pytest hypothesis>=6.0 \
            flask>=3.0.0,<5.0 \
            cryptography>=42.0.0,<46.0

      # T-2: Remove the `|| echo "...skipping"` fallback — real failures must fail the build.
      # The test file is checked for existence first; if absent the step is truly skipped.
      - name: Run property-based tests
        env:
          GLASSBOX_LOG_LEVEL: CRITICAL
        run: |
          if [ -f tests/test_property.py ]; then
            python -m pytest tests/test_property.py -v --tb=short --hypothesis-seed=0
          else
            echo "tests/test_property.py not found — skipping property tests"
          fi
