name: GlassBox CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install pytest flask>=3.0.0 pyyaml>=6.0 cryptography>=42.0.0

      - name: Run all tests (550+ total)
        env:
          GLASSBOX_LOG_LEVEL: CRITICAL
        run: python -m pytest tests/ -v --tb=short

      - name: Run examples
        env:
          GLASSBOX_LOG_LEVEL: CRITICAL
        run: python examples/industry_examples.py

      - name: Run benchmarks
        env:
          GLASSBOX_LOG_LEVEL: CRITICAL
        run: python -m glassbox.benchmarks.run_benchmarks
